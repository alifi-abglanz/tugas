<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Menu Calculator Warung</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-grid">
      <img src="itenas_cover.jfif">
      <img src="itenas_cover.jfif">
      <img src="itenas_cover.jfif">
      <img src="itenas_cover.jfif">
      <img src="itenas_cover.jfif">
      <img src="itenas_cover.jfif">
    </div>
  </div>

  <div class="content">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <ul>
        <li>Home</li>
        <li>Menu</li>
        <li class="active">Calculator</li>
      </ul>
    </div>

    <!-- MAIN -->
    <div class="main">
      <h2>Menu Calculator Warung</h2>

      <form id="formCalculator">

        <h3>Daftar Menu</h3>

        <label>Bakso Istimewa (Rp 12.000)</label>
        <input type="number" id="bakso" min="0" value="0">

        <label>Soto Spesial (Rp 10.000)</label>
        <input type="number" id="soto" min="0" value="0">

        <label>Mie Ayam Super (Rp 15.000)</label>
        <input type="number" id="mie" min="0" value="0">

        <br><br>
        <button type="submit">Hitung</button>
        <button type="reset">Reset</button>

      </form>

      <hr>

      <h3>Output</h3>

      <div class="output">
        <p>Total Harga : Rp <span id="totalHarga">0</span></p>
        <p>Diskon : Rp <span id="diskon">0</span></p>
        <p><b>Jumlah Bayar : Rp <span id="bayar">0</span></b></p>
      </div>

    </div>
  </div>

  <div class="footer">
    280224 <br>
    Sistem Informasi | ITENAS 2024
  </div>

</div>

<script>
document.getElementById("formCalculator").addEventListener("submit", function(e){
  e.preventDefault();

  const hargaBakso = 12000;
  const hargaSoto = 10000;
  const hargaMie = 15000;

  let jBakso = parseInt(document.getElementById("bakso").value) || 0;
  let jSoto = parseInt(document.getElementById("soto").value) || 0;
  let jMie = parseInt(document.getElementById("mie").value) || 0;

  let total = (jBakso * hargaBakso) +
              (jSoto * hargaSoto) +
              (jMie * hargaMie);

  let diskon = 0;

  // Aturan Diskon
  if(total >= 100000){
      diskon = total * 0.10; // 10%
  } else if(total >= 50000){
      diskon = total * 0.05; // 5%
  }

  let bayar = total - diskon;

  document.getElementById("totalHarga").innerText = total.toLocaleString();
  document.getElementById("diskon").innerText = diskon.toLocaleString();
  document.getElementById("bayar").innerText = bayar.toLocaleString();
});
</script>

</body>
</html>
